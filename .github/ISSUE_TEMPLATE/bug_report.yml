name: Bug report
description: Report a reproducible CLI, MCP, or documentation issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Do not include API keys, customer data, private product inputs, or ad account identifiers.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: The CLI/MCP tool returned...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the command, MCP client prompt, or minimal JSON input.
      placeholder: |
        1. Run ...
        2. Use input ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected...
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - MCP server
        - CLI
        - Documentation
        - Example input or output
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: adsturbo-creative-mcp@0.1.2
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: node --version
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Remove sensitive data before posting.
      render: shell

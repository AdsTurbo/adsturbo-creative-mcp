name: Bug report
description: Report a problem with the MCP server, CLI, or generated planning output.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. This project is a local-only MCP server and CLI for AI video ad planning.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the issue with the MCP tool, CLI command, or generated ad creative output.
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or MCP prompt
      description: Paste the CLI command, slash-style command, or MCP prompt you used.
      render: shell
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP client
      description: Claude Desktop, Cursor, Codex, or another MCP client.
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"

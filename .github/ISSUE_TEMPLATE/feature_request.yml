name: Feature request
description: Suggest a local-only creative planning improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What workflow would this improve?
      placeholder: I want to generate...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Ad brief
        - Hooks
        - UGC scripts
        - Storyboard
        - Variation plan
        - Script review
        - AdsTurbo prompt export
        - MCP client setup
        - CLI ergonomics
        - Multilingual docs or examples
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      placeholder: The tool should...
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Cost and safety boundary
      options:
        - label: This can work locally without AdsTurbo API calls.
          required: true
        - label: This does not require video generation or credit consumption.
          required: true
        - label: This does not require ad account access.
          required: true
